<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Food Table</title>

    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --hover: #f3f4f6;
        --accent: #2563eb;
      }

      body {
        margin: 0;
        padding: 32px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 1300px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      .subtitle {
        margin: 6px 0 16px;
        font-size: 13px;
        color: var(--muted);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
      }

      .table-wrapper {
        overflow-x: auto;
        width: 100%;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        table-layout: fixed; /* 🔥 key fix */
      }

      thead th {
        position: sticky;
        top: 0;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 12px 14px;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
      }

      tbody td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        white-space: nowrap;
      }

      tbody tr:hover {
        background: var(--hover);
      }

      .sort-arrow {
        font-size: 11px;
        margin-left: 6px;
        color: var(--muted);
      }

      th:hover .sort-arrow {
        color: var(--accent);
      }

      td,
      th {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      footer {
        margin-top: 20px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        font-size: 12px;
        color: var(--muted);
      }

      footer p {
        margin: 4px 0;
      }

      footer a {
        color: #9ca3af; /* softer gray */
        text-decoration: none;
        transition: color 0.15s ease;
      }

      footer a:hover {
        color: #6b7280; /* slightly darker on hover */
        text-decoration: underline;
      }

      /* ===== Skeleton ===== */
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
        100% {
          opacity: 1;
        }
      }

      .skeleton {
        height: 12px;
        background: #e5e7eb;
        border-radius: 6px;
        animation: pulse 1.2s infinite;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Food Database</h1>
      <div class="subtitle">Click headers to sort</div>

      <div class="card">
        <div class="table-wrapper">
          <table id="food-table">
            <colgroup>
              <col style="width: 220px" />
              <col style="width: 120px" />
              <col style="width: 90px" />
              <col style="width: 90px" />
              <col style="width: 90px" />
              <col style="width: 110px" />
              <col style="width: 130px" />
              <col style="width: 100px" />
              <col style="width: 100px" />
              <col style="width: 130px" />
            </colgroup>
            <thead>
              <tr>
                <th data-key="description">
                  Description <span class="sort-arrow">↕</span>
                </th>
                <th data-key="serving_size">
                  Serving Size <span class="sort-arrow">↕</span>
                </th>
                <th data-key="protein_g">
                  Protein <span class="sort-arrow">↕</span>
                </th>
                <th data-key="carbohydrate_g">
                  Carbs <span class="sort-arrow">↕</span>
                </th>
                <th data-key="fat_g">Fat <span class="sort-arrow">↕</span></th>
                <th data-key="saturated_fat_g">
                  Sat Fat <span class="sort-arrow">↕</span>
                </th>
                <th data-key="cholesterol_mg">
                  Cholesterol <span class="sort-arrow">↕</span>
                </th>
                <th data-key="calories">
                  Calories <span class="sort-arrow">↕</span>
                </th>
                <th data-key="weight_g">
                  Weight <span class="sort-arrow">↕</span>
                </th>
                <th data-key="calorie_density">
                  Cal Density <span class="sort-arrow">↕</span>
                </th>
              </tr>
            </thead>

            <tbody></tbody>
          </table>
        </div>
      </div>

      <footer>
        <p>
          source:
          <a href="https://www.invive.com/calorie.html"
            >https://www.invive.com/calorie.html</a
          >
        </p>
        <p>
          developed by:
          <a href="https://github.com/marvinalegre">Marvin Alegre</a>
        </p>
      </footer>
    </div>

    <script>
      let foodData = [];
      let isLoading = true;
      let sortState = { key: null, direction: "asc" };

      async function getFood() {
        const isLocal =
          location.hostname === "localhost" ||
          location.hostname === "127.0.0.1";

        const baseUrl = isLocal
          ? "http://localhost:8787"
          : "https://food.marvinalegre.workers.dev";

        const res = await fetch(`${baseUrl}/foods`);
        return res.json();
      }

      function renderSkeleton() {
        const tbody = document.querySelector("#food-table tbody");
        tbody.innerHTML = "";

        for (let i = 0; i < 30; i++) {
          const row = document.createElement("tr");

          row.innerHTML = `
            ${"<td><div class='skeleton'></div></td>".repeat(10)}
          `;

          tbody.appendChild(row);
        }
      }

      function renderFood(data) {
        const tbody = document.querySelector("#food-table tbody");
        tbody.innerHTML = "";

        data.forEach((item) => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${item.description}</td>
            <td>${item.serving_size}</td>
            <td>${item.protein_g ?? "-"}</td>
            <td>${item.carbohydrate_g ?? "-"}</td>
            <td>${item.fat_g ?? "-"}</td>
            <td>${item.saturated_fat_g ?? "-"}</td>
            <td>${item.cholesterol_mg ?? "-"}</td>
            <td>${item.calories ?? "-"}</td>
            <td>${item.weight_g ?? "-"}</td>
            <td>${Number(item.calorie_density).toFixed(2)}</td>
          `;

          tbody.appendChild(row);
        });
      }

      function updateArrows(activeKey, direction) {
        document.querySelectorAll("th").forEach((th) => {
          const arrow = th.querySelector(".sort-arrow");
          if (!arrow) return;

          const key = th.dataset.key;

          if (key !== activeKey) {
            arrow.textContent = "↕";
            arrow.style.color = "#6b7280";
          } else {
            arrow.textContent = direction === "asc" ? "▲" : "▼";
            arrow.style.color = "#2563eb";
          }
        });
      }

      function sortData(key) {
        if (isLoading) return;

        const isAsc =
          sortState.key === key ? sortState.direction === "desc" : true;

        sortState.key = key;
        sortState.direction = isAsc ? "asc" : "desc";

        foodData.sort((a, b) => {
          const valA = a[key];
          const valB = b[key];

          if (valA == null) return 1;
          if (valB == null) return -1;

          if (typeof valA === "number" && typeof valB === "number") {
            return isAsc ? valA - valB : valB - valA;
          }

          return isAsc
            ? String(valA).localeCompare(String(valB))
            : String(valB).localeCompare(String(valA));
        });

        updateArrows(key, sortState.direction);
        renderFood(foodData);
      }

      function attachSorting() {
        document.querySelectorAll("th").forEach((th) => {
          th.addEventListener("click", () => sortData(th.dataset.key));
        });
      }

      async function init() {
        try {
          isLoading = true;
          renderSkeleton();

          foodData = await getFood();

          isLoading = false;
          renderFood(foodData);
          attachSorting();
        } catch (err) {
          console.error("Failed to load food:", err);
        }
      }

      init();
    </script>
  </body>
</html>
